name: Build Caddy Custom

on:
  push:
    branches: ['main']
    paths:
      - 'caddy/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repo Name
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/caddy" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./caddy
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest