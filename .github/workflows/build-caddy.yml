name: Build Caddy Custom Image

on:
  push:
    branches: ['main']
    paths:
      - 'caddy/**' # Si attiva solo se cambi file in questa cartella

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./caddy
          push: true
          tags: ghcr.io/${{ github.actor }}/caddy:latest